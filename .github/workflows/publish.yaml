# This workflow will run tests on every push and publish to PyPI on every tag push
name: Test and Publish to PyPI and Test PyPI

on:
  release:
    types: [published]

permissions:
  contents: read  # Required to checkout code

jobs:

  lint:
    uses: ./.github/workflows/lint.yaml
  test:
    uses: ./.github/workflows/test.yaml

  publish:
    needs: [lint, test]  # Ensure this job only runs if 'test' and 'lint' are successful
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install build twine

    - name: Build the package
      run: python -m build

    - name: Determine Branch
      id: determine-branch
      run: echo "branch_name=$(echo ${GITHUB_REF} | sed 's|refs/heads/||; s|refs/tags/||')" >> $GITHUB_ENV

    - name: Publish to Test PyPI
      if: startsWith(github.ref, 'refs/tags/v') && github.event.release.prerelease
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        twine upload --verbose --repository-url https://test.pypi.org/legacy/ dist/*

    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/v') && !github.event.release.prerelease
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload --verbose dist/*

  publish-satellites:
    needs: [publish]
    runs-on: ubuntu-latest
    env:
      SATELLITE_PKGS: "excel-vba word-vba powerpoint-vba access-vba"

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install build twine

    - name: Sync satellite versions to release tag
      run: |
        python - <<'EOF'
        import os
        import re
        from pathlib import Path

        tag = "${{ github.ref_name }}"
        version = tag.lstrip("v")
        constraint = f"vba-edit=={version}"

        for pkg in os.environ["SATELLITE_PKGS"].split():
            path = Path(f"packages/{pkg}/pyproject.toml")
            content = path.read_text()
            content = re.sub(r'^version = "[^"]*"', f'version = "{version}"', content, flags=re.MULTILINE)
            content = re.sub(r'"vba-edit(?:==[^"]+)?"', f'"{constraint}"', content)
            path.write_text(content)
            print(f"Updated {pkg} to {version} with {constraint}")
        EOF

    - name: Build satellite packages
      run: |
        for pkg in $SATELLITE_PKGS; do
          rm -rf packages/$pkg/dist
          python -m build packages/$pkg
        done

    - name: Publish satellites to Test PyPI
      if: startsWith(github.ref, 'refs/tags/v') && github.event.release.prerelease
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        for pkg in $SATELLITE_PKGS; do
          twine upload --verbose --repository-url https://test.pypi.org/legacy/ packages/$pkg/dist/*
        done

    - name: Publish satellites to PyPI
      if: startsWith(github.ref, 'refs/tags/v') && !github.event.release.prerelease
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        for pkg in $SATELLITE_PKGS; do
          twine upload --verbose packages/$pkg/dist/*
        done

