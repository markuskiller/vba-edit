[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "outlook-vba"
version = "0.0.1"
description = "Name reservation for future vba-edit support for MS Outlook. Not yet implemented."
authors = [{ name = "Markus Killer", email = "m.killer@langui.ch" }]
readme = "README.md"
requires-python = ">=3.10"
license = "BSD-3-Clause"
keywords = ["vba", "outlook", "office", "automation", "macro"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Operating System :: Microsoft :: Windows",
    "Topic :: Office/Business :: Office Suites",
]

[project.urls]
Homepage = "https://github.com/markuskiller/vba-edit"
Repository = "https://github.com/markuskiller/vba-edit"
Changelog = "https://github.com/markuskiller/vba-edit/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]
